<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <script src="/js/roadTrip.js"></script>
    <title>Road Trip Map</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.21.0/dist/maplibre-gl.css"
        integrity="sha256-dhoRMPCWDqNp2RfshD99GvXKHc8ncBrvHZ1Zghs7qyU=" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/styles.css?v=4">
</head>
<body class="map-page" data-page="view">
    <div class="map-header">
        <a href="/" class="map-back" aria-label="Back to Home">←</a>
        <span id="tripName"></span>
    </div>
    <div id="map" class="map-container"></div>
    <div class="map-toggle-row" style="display:flex;gap:8px;padding:8px 0;">
        <button id="routeToggle" class="map-control" style="display:none;flex:1;">Show Route</button>
        <button id="poiToggle" class="map-control" style="flex:1;">Hide POIs</button>
    </div>
    <div id="emptyMessage" class="map-empty" style="display:none;">No photos yet</div>
    <div id="viewCarousel" class="view-carousel-container"></div>

    <script src="https://unpkg.com/maplibre-gl@5.21.0/dist/maplibre-gl.js"
        integrity="sha256-qbkAeuPV31m78vg62R7iyGWC6hUsCZAM1MhPYwevvJs=" crossorigin="anonymous"></script>
    <script src="/js/api.js"></script>
    <script src="/js/mapCache.js"></script>
    <script src="/js/mapService.js"></script>
    <script src="/js/poiLayer.js"></script>
    <script src="/js/parkStyle.js"></script>
    <script src="/js/stateParkLayer.js"></script>
    <script src="/js/photoCarousel.js"></script>
    <script src="/js/mapUI.js"></script>
    <script>
        const viewToken = window.location.pathname.split('/').filter(Boolean).pop();
        MapUI.init(viewToken);
    </script>
</body>
</html>
