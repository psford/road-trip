<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Road Trip Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" /> <!-- pragma: allowlist secret -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="map-page">
    <div class="map-header">
        <a href="/" class="map-back" aria-label="Back to Home">←</a>
        <span id="tripName"></span>
    </div>
    <div id="map" class="map-container"></div>
    <button id="routeToggle" class="map-control" style="display:none;">Show Route</button>
    <div id="emptyMessage" class="map-empty" style="display:none;">No photos yet</div>
    <div id="viewCarousel" class="view-carousel-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script> <!-- pragma: allowlist secret -->
    <script src="/js/api.js"></script>
    <script src="/js/mapService.js"></script>
    <script src="/js/photoCarousel.js"></script>
    <script src="/js/mapUI.js"></script>
    <script>
        const viewToken = window.location.pathname.split('/').filter(Boolean).pop();
        MapUI.init(viewToken);
    </script>
</body>
</html>
