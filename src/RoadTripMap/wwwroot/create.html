<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <script src="/js/roadTrip.js"></script>
    <script src="/js/offlineError.js"></script>
    <title>Create a Road Trip - Road Trip Map</title>
    <link rel="stylesheet" href="/css/styles.css?v=4">
</head>
<body data-page="create">
    <div class="container">
        <div class="page-header">
            <nav class="nav">
                <a href="/">← Back</a>
            </nav>
            <h1>Create a Road Trip</h1>
        </div>

        <!-- Error message -->
        <div id="errorMessage" class="message error hidden"></div>

        <!-- Trip form -->
        <div class="card">
            <form id="createTripForm">
                <div class="form-group">
                    <label for="tripName">Trip Name *</label>
                    <input
                        type="text"
                        id="tripName"
                        name="name"
                        placeholder="e.g., Cross Country 2026"
                        required
                        autocomplete="off"
                        autocapitalize="words"
                    >
                </div>

                <div class="form-group">
                    <label for="tripDescription">Description (optional)</label>
                    <textarea
                        id="tripDescription"
                        name="description"
                        placeholder="e.g., A summer road trip across the USA"
                        autocapitalize="sentences"
                    ></textarea>
                </div>

                <button type="submit" id="createButton" class="button button-primary">Create Trip</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/tripStorage.js"></script>
    <script>
        document.getElementById('createTripForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const errorEl = document.getElementById('errorMessage');
            errorEl.classList.add('hidden');

            const name = document.getElementById('tripName').value.trim();
            const description = document.getElementById('tripDescription').value.trim();

            try {
                if (!name) {
                    throw new Error('Trip name is required');
                }

                // Show loading state
                const btn = document.getElementById('createButton');
                btn.disabled = true;
                btn.textContent = 'Creating...';

                const result = await API.createTrip(name, description || null);

                // Save trip to localStorage for My Trips
                TripStorage.saveTrip(name, result.postUrl, result.viewUrl || '');

                // Redirect straight to the post page.
                //
                // In the Capacitor shell, window.location.href is a cross-origin
                // navigation (shell origin is capacitor://localhost, App Service
                // origin is https://app-roadtripmap-prod.azurewebsites.net) and
                // WKWebView hands the URL off to Safari. That "kick to external
                // browser" is the bug we explicitly defend against here.
                const hasFetchAndSwap = typeof FetchAndSwap !== 'undefined'
                    && typeof FetchAndSwap.fetchAndSwap === 'function';
                const inShell = typeof RoadTrip !== 'undefined'
                    && typeof RoadTrip.isNativePlatform === 'function'
                    && RoadTrip.isNativePlatform();

                if (hasFetchAndSwap) {
                    // pushState resolves against document.baseURI (APP_BASE via
                    // <base href>). In the shell at capacitor://localhost/ that's
                    // cross-origin and pushState SecurityErrors. Resolve against
                    // window.location.href to stay same-origin.
                    const prevUrl = window.location.href;
                    const pushUrl = new URL(result.postUrl, window.location.href).href;
                    history.pushState({}, '', pushUrl);
                    try {
                        await FetchAndSwap.fetchAndSwap(result.postUrl);
                    } catch (navErr) {
                        // Swap failed — roll history back so the user isn't left
                        // on a URL that never rendered. Re-throw so the outer
                        // catch surfaces a friendly error and re-enables the button.
                        history.replaceState({}, '', prevUrl);
                        throw navErr;
                    }
                } else if (inShell) {
                    // In the shell without FetchAndSwap, window.location.href
                    // would kick the user to Safari. Fail closed with an
                    // actionable error instead.
                    throw new Error('Navigation unavailable in shell. Please reopen the app and try again.');
                } else {
                    // Regular browser: a full-document navigation stays same-origin.
                    window.location.href = result.postUrl;
                }
            } catch (error) {
                errorEl.textContent = OfflineError.friendlyMessage(error, 'create');
                errorEl.classList.remove('hidden');
                const btn = document.getElementById('createButton');
                btn.disabled = false;
                btn.textContent = 'Create Trip';
            }
        });
    </script>
</body>
</html>
