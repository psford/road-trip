name: Road Trip CI

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - '**'
      - '.github/workflows/roadtrip-ci.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - '**'
      - '.github/workflows/roadtrip-ci.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: 'RoadTripMap.sln'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Run tests
      run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: roadtrip-test-results
        path: '**/TestResults/*.trx'
        retention-days: 30
