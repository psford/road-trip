name: Road Trip CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: 'Run integration tests against live APIs (requires network)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: 'RoadTripMap.sln'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Run unit tests
      run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal --filter "Category!=Integration" --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: roadtrip-test-results
        path: '**/TestResults/*.trx'
        retention-days: 30

  # Optional integration test job — runs against live APIs on demand
  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration_tests == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore and build
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release

    - name: Run integration tests (live API)
      env:
        RUN_INTEGRATION_TESTS: '1'
      run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal --filter "Category=Integration" --logger "trx;LogFileName=integration-test-results.trx"
      timeout-minutes: 5

    - name: Upload integration test results
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: roadtrip-integration-test-results
        path: '**/TestResults/integration-test-results.trx'
        retention-days: 30

  # Gate job for branch protection — single required check name
  build-and-test-gate:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build-and-test result
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "build-and-test failed"
            exit 1
          fi
