# .swiftlint.yml — Road Trip iOS
#
# SwiftLint enforces codebase invariants that the compiler cannot check.
# Install: brew install swiftlint
# Run manually: swiftlint lint --config ios-swift/RoadTrip/.swiftlint.yml
# The Xcode build phase (project.yml postBuildScripts) runs this automatically
# when swiftlint is installed; the build never fails if it is absent.

included:
  - RoadTrip
  - RoadTripTests
  - RoadTripUITests

excluded:
  - .build-dd
  - build
  - RoadTrip.xcodeproj

# ─── Custom rules: codebase invariants ────────────────────────────────────────

custom_rules:

  # staging_picker_requires_shared_library
  #
  # PhotosPicker / .photosPicker calls MUST include photoLibrary: or they must
  # go through StagingPhotosPicker / .stagingPhotosPicker which hard-codes it.
  # Without photoLibrary: .shared(), item.itemIdentifier is nil and every pick
  # throws CaptureError.noAsset.
  #
  # This rule flags single-line PhotosPicker( or .photosPicker( that contain
  # selection: or matching: (indicating a real picker call, not a type reference)
  # but do NOT contain photoLibrary:.
  #
  # StagingPhotosPicker.swift is excluded: it is the canonical implementation
  # that hard-codes the parameter, and the raw PhotosPicker call inside it is
  # intentional.
  staging_picker_requires_shared_library:
    name: "PhotosPicker missing photoLibrary:"
    regex: '(PhotosPicker\(|\.photosPicker\()(?=.*\b(selection:|matching:))(?!.*photoLibrary:)'
    message: >
      PhotosPicker / .photosPicker must include photoLibrary: .shared() so
      item.itemIdentifier is populated for EXIF capture.
      Use StagingPhotosPicker or .stagingPhotosPicker instead, which hard-code
      the required parameters (see Views/Photos/StagingPhotosPicker.swift).
    severity: error
    excluded: ".*/StagingPhotosPicker\\.swift"

  # userdefaults_no_remove_persistent_domain
  #
  # removePersistentDomain(forName:) corrupts the UserDefaults in-memory cache:
  # it removes all keys from the domain including those written by the current
  # process that have not yet been flushed to disk. Subsequent reads return nil
  # even though the domain was re-inserted, until the next process launch.
  # This caused a real bug (AppBootstrap reset: failed to persist launch flags).
  # Use UserDefaults.standard.removeObject(forKey:) per-key instead.
  userdefaults_no_remove_persistent_domain:
    name: "UserDefaults.removePersistentDomain is banned"
    regex: 'removePersistentDomain\('
    message: >
      removePersistentDomain(forName:) corrupts the UserDefaults in-memory cache
      (all in-flight writes for the domain are lost until next launch).
      Use removeObject(forKey:) per-key instead.
      See AppBootstrap.swift for the correct pattern.
    severity: error

# ─── Standard rules ───────────────────────────────────────────────────────────

# Opt-in rules worth enabling for a SwiftUI codebase
opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - identical_operands
  - modifier_order
  - overridden_super_call
  - redundant_nil_coalescing
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_import

# Disable noisy rules that conflict with SwiftUI patterns
disabled_rules:
  - trailing_whitespace   # Xcode auto-trims; avoid false positives in generated code

# Lenient line-length for SwiftUI view builders which naturally run long
line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_urls: true
