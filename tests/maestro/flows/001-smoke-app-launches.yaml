# Layer 2 smoke test: app launches, WKWebView renders the home page.
#
# What this guards:
#   - App bundle install + launch succeeds on the simulator
#   - WKWebView boots (the iOS Offline Shell's loader.js runs to completion)
#   - The home page HTML lands in the WebView and is interactable
#
# What this doesn't cover:
#   - Anything past the home screen render. That's flow 002 onward.
#
# If THIS flow fails the iOS shell is fundamentally broken — the app
# isn't even getting to first paint. Treat as P0.

appId: com.psford.roadtripmap
---
- launchApp:
    clearState: true
- assertVisible: "Road Trip Map"
- assertVisible: "Create a Trip"
- assertVisible: "How It Works"
